<!doctype html>
<html lang="{{ page.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}Yijia Wang Portfolio</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="keywords" content="{{ site.keywords }}">
    <meta name="author" content="Yijia Wang">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Yijia Wang Portfolio">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}Yijia Wang Portfolio">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:image" content="{{ '/assets/images/social-preview.jpg' | absolute_url }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}Yijia Wang Portfolio">
    <meta name="twitter:description" content="{{ page.description | default: site.description }}">
    <meta name="twitter:image" content="{{ '/assets/images/social-preview.jpg' | absolute_url }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/portfolio.css?v=20260611c' | relative_url }}">
  </head>
  <body class="{{ page.body_class }}">
    {% include header.html %}
    <main>
      {{ content }}
    </main>
    {% include footer.html %}
    <script>
      window.siteLanguage = "{{ page.lang | default: 'en' }}";
    </script>
    <script src="{{ '/assets/js/language-toggle.js?v=20260611c' | relative_url }}"></script>
    <script src="{{ '/assets/js/slideshow.js?v=20260611c' | relative_url }}"></script>
  </body>
</html>
